name: Build and Test Docker Image

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: sqlite+aiosqlite:///./test.db
      REDIS_URL: redis://localhost:6379
      OPENAI_API_KEY: ci
      API_KEY: ci
      KROKI_BASE_URL: https://kroki.io
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: diagram-generation-api:ci

      - name: Run container and healthcheck
        run: |
          docker run -d --name diagram-ci -p 8000:8000 diagram-generation-api:ci uvicorn app.main:app --host 0.0.0.0 --port 8000
          echo "Waiting for server..."
          for i in {1..10}; do
            sleep 2
            if curl -sSf http://localhost:8000/health; then
              echo "healthy" && break
            fi
          done
          docker stop diagram-ci || true
