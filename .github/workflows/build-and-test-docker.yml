name: Build and Test Docker Image

on:
  push:
    branches: [ main, "shazari888-*" ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: sqlite+aiosqlite:///./test.db
      REDIS_URL: redis://localhost:6379
      OPENAI_API_KEY: ci
      API_KEY: ci
      KROKI_BASE_URL: https://kroki.io
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: diagram-generation-api:ci

      - name: Run container and healthcheck
        run: |
          cleanup() {
            docker logs diagram-ci || true
            docker stop diagram-ci || true
            docker rm diagram-ci || true
          }
          trap cleanup EXIT
          docker run -d --name diagram-ci -p 8000:8000 \
            -e DATABASE_URL=sqlite+aiosqlite:///./test.db \
            -e REDIS_URL=redis://localhost:6379 \
            -e OPENAI_API_KEY=ci \
            -e API_KEY=ci \
            diagram-generation-api:ci
          echo "Waiting for server..."
          sleep 5
          healthy=0
          for i in {1..10}; do
            sleep 2
            if curl -sSf http://localhost:8000/health > /dev/null 2>&1; then
              echo "✅ Server is healthy"
              healthy=1
              break
            fi
            echo "Attempt $i: waiting for server..."
          done
          if [ "$healthy" -ne 1 ]; then
            echo "❌ Server did not become healthy in time"
            exit 1
          fi
          python - <<'PY'
          import json
          import time
          import urllib.error
          import urllib.request

          def post(data, api_key="ci"):
              delays = [0.5, 1.0, 2.0]
              for index, delay in enumerate([0.0] + delays):
                  if delay:
                      time.sleep(delay)
                  req = urllib.request.Request(
                      "http://localhost:8000/diagrams/generate",
                      data=json.dumps(data).encode("utf-8"),
                      headers={"Content-Type": "application/json", "X-API-Key": api_key},
                      method="POST",
                  )
                  try:
                      with urllib.request.urlopen(req, timeout=60) as resp:
                          payload = json.loads(resp.read().decode("utf-8"))
                      return payload
                  except urllib.error.HTTPError as exc:
                      if exc.code not in (500, 502, 503, 504) or index == len(delays):
                          raise
              raise AssertionError("Unreachable retry state")

          # Auth checks
          try:
              post({"prompt": "x", "diagram_type": "mermaid", "format": "svg"}, api_key="wrong")
              raise AssertionError("Expected 401 for wrong API key")
          except urllib.error.HTTPError as exc:
              assert exc.code == 401, exc.code

          req = urllib.request.Request(
              "http://localhost:8000/diagrams/generate",
              data=json.dumps({"prompt": "x", "diagram_type": "mermaid", "format": "svg"}).encode("utf-8"),
              headers={"Content-Type": "application/json"},
              method="POST",
          )
          try:
              urllib.request.urlopen(req, timeout=60)
              raise AssertionError("Expected 401 for missing API key")
          except urllib.error.HTTPError as exc:
              assert exc.code == 401, exc.code

          # Full type/format matrix
          diagram_types = ["mermaid", "d2", "plantuml", "graphviz"]
          output_formats = ["svg", "png", "pdf"]
          for diagram_type in diagram_types:
              for output_format in output_formats:
                  print(f"Testing {diagram_type}/{output_format}")
                  result = post(
                      {
                          "prompt": f"Create a login flow chart for {diagram_type} as {output_format}",
                          "diagram_type": diagram_type,
                          "format": output_format,
                      }
                  )
                  assert result["format"] == output_format, (diagram_type, output_format, result["format"])
                  assert result["diagram"]["diagram_type"] == diagram_type, (
                      diagram_type,
                      output_format,
                      result["diagram"]["diagram_type"],
                  )
                  assert result["rendered"], (diagram_type, output_format, "empty rendered")
          print("Auth checks and full diagram type/format matrix passed")
          PY