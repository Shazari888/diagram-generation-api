name: Build and Test Docker Image

on:
  push:
    branches: [ main, "shazari888-*" ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: sqlite+aiosqlite:///./test.db
      REDIS_URL: redis://localhost:6379
      OPENAI_API_KEY: ci
      API_KEY: ci
      KROKI_BASE_URL: https://kroki.io
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: diagram-generation-api:ci

      - name: Run container and healthcheck
        run: |
          docker run -d --name diagram-ci -p 8000:8000 \
            -e DATABASE_URL=sqlite+aiosqlite:///./test.db \
            -e REDIS_URL=redis://localhost:6379 \
            -e OPENAI_API_KEY=ci \
            -e API_KEY=ci \
            diagram-generation-api:ci
          echo "Waiting for server..."
          sleep 5
          for i in {1..10}; do
            sleep 2
            if curl -sSf http://localhost:8000/health > /dev/null 2>&1; then
              echo "✅ Server is healthy"
              break
            fi
            echo "Attempt $i: waiting for server..."
          done
          python - <<'PY'
          import json
          import urllib.request

          def post(data):
              req = urllib.request.Request(
                  "http://localhost:8000/diagrams/generate",
                  data=json.dumps(data).encode("utf-8"),
                  headers={"Content-Type": "application/json", "X-API-Key": "ci"},
                  method="POST",
              )
              with urllib.request.urlopen(req, timeout=60) as resp:
                  payload = json.loads(resp.read().decode("utf-8"))
              return payload

          cases = [
              ("mermaid", "pdf"),
              ("d2", "png"),
              ("d2", "pdf"),
          ]

          for diagram_type, output_format in cases:
              result = post(
                  {
                      "prompt": "Create a login flow chart",
                      "diagram_type": diagram_type,
                      "format": output_format,
                  }
              )
              assert result["format"] == output_format, (diagram_type, output_format, result["format"])
              assert result["rendered"], (diagram_type, output_format, "empty rendered")
          print("Conversion fallback checks passed")
          PY
          docker logs diagram-ci || true
          docker stop diagram-ci || true
          docker rm diagram-ci || true